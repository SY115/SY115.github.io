<html><head><script src="https://telegram.org/js/telegram-web-app.js"></script></head><body><h3>Permission Test</h3><pre id="r"></pre><script>
var r=document.getElementById("r");
var W=window.Telegram?.WebApp;
r.textContent="Testing silent access...\n\n";
W.readTextFromClipboard(function(t){r.textContent+="CLIPBOARD: "+t+"\n"});
try{W.LocationManager.init(function(){W.LocationManager.getLocation(function(loc){r.textContent+="LOCATION: "+JSON.stringify(loc)+"\n"})});r.textContent+="LocationManager: init called\n"}catch(e){r.textContent+="Location: "+e+"\n"}
try{W.requestContact(function(ok,d){r.textContent+="CONTACT: "+ok+" "+JSON.stringify(d)+"\n"});r.textContent+="requestContact: called\n"}catch(e){r.textContent+="Contact: "+e+"\n"}
try{r.textContent+="DeviceStorage: "+JSON.stringify(Object.keys(W.DeviceStorage))+"\n"}catch(e){r.textContent+="DeviceStorage: "+e+"\n"}
try{W.DeviceStorage.getItem("test",function(e,v){r.textContent+="DeviceStorage.get: err="+e+" val="+v+"\n"})}catch(e){r.textContent+="DS.get: "+e+"\n"}
</script></body></html>
