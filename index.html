<html><head><script src="https://telegram.org/js/telegram-web-app.js"></script></head><body><h3>Clipboard Test</h3><p>先复制一段文字，然后点下面的按钮</p><button onclick="test()">读取剪贴板</button><pre id="r"></pre><script>
function test(){
var r=document.getElementById("r");
r.textContent="Reading clipboard...\n";
window.Telegram.WebApp.readTextFromClipboard(function(t){
r.textContent+="CLIPBOARD: ["+t+"]\n";
r.textContent+="Type: "+typeof t+"\n";
r.textContent+="Length: "+(t?t.length:"null")+"\n";
});
}
</script></body></html>
