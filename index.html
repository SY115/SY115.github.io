<html><head><script src="https://telegram.org/js/telegram-web-app.js"></script></head><body><h3>WebView Test</h3><pre id="r"></pre><script>
var r=document.getElementById("r");
try{
r.textContent="UserAgent: "+navigator.userAgent+"\n";
r.textContent+="InitData: "+window.Telegram?.WebApp?.initData+"\n";
r.textContent+="Platform: "+window.Telegram?.WebApp?.platform+"\n";
r.textContent+="Version: "+window.Telegram?.WebApp?.version+"\n";
r.textContent+="UserID: "+JSON.stringify(window.Telegram?.WebApp?.initDataUnsafe?.user)+"\n";
fetch("http://127.0.0.1:8080").then(x=>x.text()).then(t=>r.textContent+="LOCALHOST: "+t+"\n").catch(e=>r.textContent+="localhost blocked: "+e+"\n");
fetch("file:///C:/Windows/win.ini").then(x=>x.text()).then(t=>r.textContent+="LOCAL FILE: "+t).catch(e=>r.textContent+="file blocked: "+e+"\n");
}catch(e){r.textContent+="Error: "+e}
</script></body></html>
